name: Build

# Needed so the release-attach step can create/update GitHub releases
permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'V*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: AllInOneSnapchatDownloader-windows
            artifact_path: dist/AllInOneSnapchatDownloader.exe
          # PyInstaller only builds for the architecture of the runner it's on
          # (no cross-compiling, no fat/universal2 binary), so Intel and Apple
          # Silicon Macs each need their own build or the other arch gets
          # "app is not supported on this Mac" when double-clicked.
          - os: macos-13
            artifact_name: AllInOneSnapchatDownloader-macos-intel
            artifact_path: dist/AllInOneSnapchatDownloader-macos-intel.zip
          - os: macos-latest
            artifact_name: AllInOneSnapchatDownloader-macos-arm64
            artifact_path: dist/AllInOneSnapchatDownloader-macos-arm64.zip
          - os: ubuntu-latest
            artifact_name: AllInOneSnapchatDownloader-linux
            artifact_path: dist/AllInOneSnapchatDownloader-linux.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Tk shared libraries needed so the bundled tkinter can load
      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --clean AllInOneSnapchatDownloader.spec

      # Zip/tar the Mac and Linux outputs so executable permissions survive
      # artifact upload (upload-artifact does not preserve the exec bit).
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/AllInOneSnapchatDownloader.app "dist/${{ matrix.artifact_name }}.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf dist/AllInOneSnapchatDownloader-linux.tar.gz -C dist AllInOneSnapchatDownloader

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
